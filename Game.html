<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectives list</title>
    <link rel="stylesheet" href="public/output.css">
</head>

<body class="surface flex items-center justify-center">
    <div class="content-flex gap-12">
        <div class="breadcrumbs text-sm">
            <ul>
                <li><a>Home</a></li>
                <li>Game Name</li>
            </ul>
        </div>
        <div class="content-flex gap-4">
            <div class="flex w-[874px] gap-4">
                <label class="input w-full">
                    <input type="text" id="input-box" class="grow w-full" placeholder="Write a new objective" />
                    <kbd class="kbd kbd-sm bg-neutral-content text-neutral border-neutral/30">⏎</kbd>
                </label>

                <button id="add-btn-js" class="btn btn-primary rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                        <path
                            d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" />
                    </svg>
                    Add</button>
            </div>

            <div class="card flex bg-base-100 shadow-xl">
                <div class="card-body bg-base-300 rounded-box">
                    <!-- Filter top bar -->
                    <div class="sorting-bar px-6 py-5">
                        <div class="flex grid-cols-2 items-center justify-center gap-2">
                            <button type="button" class="btn btn-ghost btn-md text-accent-content hover:bg-neutral/5">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                                    class="size-4">
                                    <path fill-rule="evenodd"
                                        d="M2.628 1.601C5.028 1.206 7.49 1 10 1s4.973.206 7.372.601a.75.75 0 0 1 .628.74v2.288a2.25 2.25 0 0 1-.659 1.59l-4.682 4.683a2.25 2.25 0 0 0-.659 1.59v3.037c0 .684-.31 1.33-.844 1.757l-1.937 1.55A.75.75 0 0 1 8 18.25v-5.757a2.25 2.25 0 0 0-.659-1.591L2.659 6.22A2.25 2.25 0 0 1 2 4.629V2.34a.75.75 0 0 1 .628-.74Z"
                                        clip-rule="evenodd" />
                                </svg>
                                Last played
                            </button>

                            <form class="filter btn-accent">
                                <input class="btn btn-sm rounded-full text-accent-content" type="radio" name="frameworks"
                                    aria-label="Filter 1" />
                                <input class="btn btn-sm rounded-full text-accent-content" type="radio" name="frameworks"
                                    aria-label="Filter 2" />
                                <input class="btn btn-sm rounded-full text-accent-content" type="radio" name="frameworks"
                                    aria-label="Filter 3" />
                                <input class="btn btn-sm rounded-full text-accent-content" type="reset" value="×" />
                            </form>

                        </div>


                        <button type="button" id="deleteAll-btn-js" class="btn btn-error btn-sm rounded-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                                class="size-4">
                                <path fill-rule="evenodd"
                                    d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z"
                                    clip-rule="evenodd" />
                            </svg>
                            Delete All
                        </button>
                    </div>

                    <ul id="list-container" class="list mt-4 space-y-2">
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./js/main.js"></script>

    <!-- Warning Modal -->
    <dialog id="my_modal_1" class="modal">
        <div class="modal-box">
            <h3 id="confirm-modal-title" class="text-lg font-bold">Confirm action</h3>
            <p id="confirm-modal-message" class="py-4">Are you sure?</p>

            <div class="modal-action">
                <button id="confirm-delete-all" class="btn btn-error">Confirm</button>
                <button id="cancel-delete-all" class="btn">Cancel</button>
            </div>
        </div>
    </dialog>

    <!-- Side-drawer for Tasks -->
    <div id="task-detail-panel" class="fixed right-0 top-0 h-full w-160 bg-base-200 shadow-lg hidden px-[60px]">
        <div></div>
    </div>
</body>

</html>
